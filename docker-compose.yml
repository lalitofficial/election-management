services:
  postgres:
    image: postgres:16-alpine
    container_name: elecmanager-postgres
    environment:
      POSTGRES_DB: elecmanager
      POSTGRES_USER: elecmanager
      POSTGRES_PASSWORD: elecmanager
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
